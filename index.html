<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIAA</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-logo">LIAA</div>
  <div class="nav-links">
    <a href="#about">Über uns</a>
    <a href="#gallery">Galerie</a>
    <a href="#events">Termine</a>
    <a href="#contact">Kontakt</a>
  </div>
</nav>

<header class="hero">
  <div class="hero-text">
    <h1>LIAA</h1>
    <p>Kollektiv für Kunst, Austausch und Projekte.</p>
    <a href="#events" class="btn">Termine ansehen</a>
  </div>
</header>

<section id="about">
  <h2>Über uns</h2>
  <p>
    LIAA ist ein Kollektiv, das sich auf gemeinsame Projekte,
    künstlerischen Austausch und Veranstaltungen konzentriert.
  </p>
</section>

<section id="gallery">
  <h2>Galerie</h2>
  <div class="gallery-grid">
    <img src="images/img1.jpg" alt="">
    <img src="images/img2.jpg" alt="">
    <img src="images/img3.jpg" alt="">
  </div>
</section>

<section id="events">
  <h2>Termine</h2>
  <div id="event-list"></div>
</section>

<section id="contact">
  <h2>Kontakt</h2>
  <p>Email: info@liaa.de</p>
</section>

<script src="script.js"></script>
</body>
</html>
