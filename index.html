<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIAA Kollektiv</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="#" class="nav-logo">LIAA Kollektiv</a>
        <ul class="nav-links">
            <li><a href="#ueber-uns" data-lang="de">Über uns</a><a href="#ueber-uns" data-lang="en">About</a></li>
            <li><a href="#galerie" data-lang="de">Galerie</a><a href="#galerie" data-lang="en">Gallery</a></li>
            <li><a href="#termine" data-lang="de">Termine</a><a href="#termine" data-lang="en">Events</a></li>
            <li><a href="#kontakt" data-lang="de">Kontakt</a><a href="#kontakt" data-lang="en">Contact</a></li>
        </ul>
        <div class="lang-toggle">
            <button class="lang-btn active" onclick="setLang('de')">DE</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </nav>

    <main>
        <section id="ueber-uns">
            <h1>Über uns</h1>
            <p>Willkommen beim LIAA Kollektiv!</p>
        </section>

        <section id="galerie">
            <h1>Galerie</h1>
            <p>Hier kommen Bilder hin.</p>
        </section>

        <section id="termine">
            <h1>Termine</h1>
            <div id="events-list"></div>
        </section>

        <section id="kontakt">
            <h1>Kontakt</h1>
            <p>Kontaktiere uns!</p>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        // Load events from events.json
        fetch('events.json')
            .then(response => response.json())
            .then(events => {
                const eventsList = document.getElementById('events-list');
                events.forEach(event => {
                    eventsList.innerHTML += `<div><strong>${event.date}</strong>: ${event.title} - ${event.description}</div>`;
                });
            });
    </script>
</body>
</html>
